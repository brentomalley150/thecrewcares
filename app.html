<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>CrewCares — Clickable Prototype</title>
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f4f6f9;
    --color-background-tertiary: #eef0f4;
    --color-text-primary: #2c2c2a;
    --color-text-secondary: #5f5e5a;
    --color-border-tertiary: rgba(0,0,0,0.1);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1a1a1a;
      --color-background-secondary: #242424;
      --color-background-tertiary: #0f0f0f;
      --color-text-primary: #e8e8e8;
      --color-text-secondary: #a8a8a8;
      --color-border-tertiary: rgba(255,255,255,0.1);
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100vh;
    background: var(--color-background-tertiary);
    font-family: var(--font-sans);
    color: var(--color-text-primary);
    -webkit-font-smoothing: antialiased;
  }
  body { display: flex; flex-direction: column; align-items: center; padding: 20px 16px 40px; }

  .nav-top {
    background: #4395a2;
    padding: 12px 0;
    width: 100%;
    max-width: 420px;
    margin-bottom: 16px;
    border-radius: 10px;
  }
  .nav-top-inner { max-width: 420px; margin: 0 auto; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .nav-top-brand { color: #fff; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 6px; }
  .nav-top-links { display: flex; gap: 2px; flex-wrap: wrap; justify-content: flex-end; }
  .nav-top-links a { color: rgba(255,255,255,0.95); text-decoration: none; font-size: 11.5px; padding: 4px 7px; border-radius: 6px; }
  .nav-top-links a:hover { background: rgba(255,255,255,0.12); }

  h1.page-title { font-size: 18px; font-weight: 500; margin: 0 0 4px; }
  p.page-sub { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 12px; text-align: center; }
  .feature-highlight {
    background: rgba(100, 167, 11, 0.12); color: #3B6D11;
    border: 1px solid rgba(100, 167, 11, 0.25);
    padding: 6px 14px; border-radius: 999px;
    font-size: 12.5px; font-weight: 500; margin-bottom: 20px;
    display: inline-flex; align-items: center; gap: 6px;
  }

  .cc-reset-bar { max-width: 420px; margin: 0 auto 20px; display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
  .cc-jump-btn {
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 999px; padding: 5px 11px;
    font-size: 11.5px; color: var(--color-text-secondary);
    cursor: pointer; font-family: inherit;
  }
  .cc-jump-btn:hover { background: var(--color-background-primary); color: var(--color-text-primary); }
  .cc-jump-btn.active { background: #4395a2; color: #fff; border-color: #4395a2; }
  .cc-frame {
    width: 390px; max-width: 100%; height: 800px;
    margin: 0 auto; background: #000;
    border-radius: 44px; padding: 12px;
    position: relative; border: 1px solid var(--color-border-tertiary);
  }
  @media (max-width: 420px) {
    body { padding: 0; }
    .cc-reset-bar, .nav-top, .page-title, .page-sub, .feature-highlight { display: none; }
    .cc-frame { width: 100vw; height: 100vh; border-radius: 0; padding: 0; border: 0; }
    .cc-notch { display: none; }
    .cc-screen { border-radius: 0 !important; }
  }
  .cc-notch {
    position: absolute; top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 28px;
    background: #000; border-radius: 0 0 18px 18px; z-index: 20;
  }
  .cc-screen {
    width: 100%; height: 100%; background: #F0F2F8;
    border-radius: 34px; overflow: hidden; position: relative;
    font-family: -apple-system, BlinkMacSystemFont, var(--font-sans);
    color: #2c2c2a;
  }
  .cc-status { height: 44px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 28px 6px; font-size: 15px; font-weight: 500; color: #000; background: #F0F2F8; }
  .cc-status-icons { display: flex; gap: 5px; align-items: center; }
  .cc-header { height: 48px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; background: #4395a2; color: #fff; font-size: 17px; font-weight: 500; }
  .cc-header-btn { background: transparent; border: 0; color: #fff; font-size: 15px; font-weight: 400; padding: 6px 4px; cursor: pointer; }
  .cc-header-btn:hover { opacity: 0.85; }
  .cc-header-btn.primary { font-weight: 500; }
  .cc-body { height: calc(100% - 92px); overflow-y: auto; background: #F0F2F8; -webkit-overflow-scrolling: touch; }
  .cc-tab-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 78px; background: #fff;
    border-top: 0.5px solid rgba(0,0,0,0.1);
    display: flex; padding: 8px 0 22px;
  }
  .cc-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; background: transparent; border: 0; color: #888780; font-size: 10px; cursor: pointer; font-family: inherit; padding: 0; }
  .cc-tab.active { color: #4395a2; }
  .cc-tab svg { width: 24px; height: 24px; }

  .cc-btn-primary { background: #4395a2; color: #fff; border: 0; border-radius: 8px; padding: 14px 20px; font-size: 16px; font-weight: 500; font-family: inherit; cursor: pointer; width: 100%; }
  .cc-btn-primary:hover { background: #3a848f; }
  .cc-btn-secondary { background: #fff; color: #4395a2; border: 1px solid #4395a2; border-radius: 8px; padding: 14px 20px; font-size: 16px; font-weight: 500; font-family: inherit; cursor: pointer; width: 100%; }
  .cc-btn-secondary:hover { background: #eaf4f5; }

  .cc-input-group { margin-bottom: 20px; }
  .cc-label { display: block; font-size: 13px; color: #4a4a4a; margin: 0 0 6px; font-weight: 500; }
  .cc-input { width: 100%; padding: 12px; border: 1px solid #D3D1C7; border-radius: 8px; background: #fff; font-size: 16px; font-family: inherit; color: #2c2c2a; }
  .cc-input:focus { outline: none; border-color: #4395a2; }
  .cc-hint { font-size: 12px; color: #888780; margin: 4px 0 0; font-style: italic; }

  .cc-card { background: #fff; border-radius: 10px; padding: 14px; margin: 0 12px 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .cc-avatar { width: 38px; height: 38px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; color: #fff; flex-shrink: 0; }
  .cc-avatar.lg { width: 56px; height: 56px; font-size: 20px; }
  .cc-avatar.sm { width: 28px; height: 28px; font-size: 11px; }
  .cc-pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; }
  .cc-pill.todo { background: #fef3e3; color: #854F0B; }
  .cc-pill.progress, .cc-pill.inprogress { background: #e6f1fb; color: #185FA5; }
  .cc-pill.done { background: #eaf3de; color: #3B6D11; }
  .cc-pill.unassigned { background: #f1efe8; color: #5F5E5A; }
  .cc-section-head { padding: 16px 16px 8px; font-size: 13px; color: #888780; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

  .cc-chat-bubble { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.35; margin-bottom: 2px; }
  .cc-chat-bubble.mine { background: #4395a2; color: #fff; border-bottom-right-radius: 4px; }
  .cc-chat-bubble.theirs { background: #fff; color: #2c2c2a; border-bottom-left-radius: 4px; }
  .cc-chat-bubble.ai { background: #eaf3de; color: #2c4f0c; border-bottom-left-radius: 4px; border: 1px solid rgba(100, 167, 11, 0.25); }
  .cc-chat-row { display: flex; padding: 2px 12px; }
  .cc-chat-row.mine { justify-content: flex-end; }
  .cc-chat-row.theirs { justify-content: flex-start; align-items: flex-end; gap: 6px; }
  .cc-chat-sender { font-size: 11px; color: #888780; margin: 6px 14px 2px; }
  .cc-chat-sender.ai { color: #3B6D11; font-weight: 500; display: flex; align-items: center; gap: 4px; margin-left: 50px; }
  .cc-chat-sender.service { color: #0C447C; font-weight: 500; display: flex; align-items: center; gap: 4px; margin-left: 50px; }
  .cc-dot-ind { width: 8px; height: 8px; border-radius: 50%; background: #64a70b; display: inline-block; }

  .cc-code-boxes { display: flex; gap: 8px; justify-content: center; margin: 20px 0; }
  .cc-code-box { width: 48px; height: 58px; border: 1.5px solid #D3D1C7; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 500; background: #fff; color: #2c2c2a; }
  .cc-code-box.filled { border-color: #4395a2; }

  .cc-chat-input-row { position: absolute; bottom: 78px; left: 0; right: 0; background: #fff; border-top: 0.5px solid rgba(0,0,0,0.08); padding: 8px 12px; display: flex; gap: 8px; align-items: center; }
  .cc-chat-input { flex: 1; border: 1px solid #D3D1C7; border-radius: 18px; padding: 8px 14px; font-size: 15px; font-family: inherit; background: #F4F6F9; color: #2c2c2a; }
  .cc-send-btn { background: #4395a2; color: #fff; border: 0; border-radius: 50%; width: 34px; height: 34px; font-size: 18px; cursor: pointer; }

  .cc-calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #2c2c2a; position: relative; cursor: pointer; }
  .cc-calendar-day.other-month { color: #D3D1C7; }
  .cc-calendar-day.today { background: #4395a2; color: #fff; border-radius: 50%; font-weight: 500; }
  .cc-calendar-day.has-event::after { content: ""; position: absolute; bottom: 4px; width: 4px; height: 4px; border-radius: 50%; background: #e99797; }

  .cc-task-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; }
  .cc-checkbox { width: 22px; height: 22px; border: 2px solid #B4B2A9; border-radius: 6px; flex-shrink: 0; margin-top: 1px; cursor: pointer; }
  .cc-checkbox.checked { background: #64a70b; border-color: #64a70b; display: flex; align-items: center; justify-content: center; }

  .cc-menu-item { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.06); cursor: pointer; font-size: 15px; }
  .cc-menu-item:hover { background: #F4F6F9; }

  .cc-hamburger { background: transparent; border: 0; padding: 8px; cursor: pointer; display: flex; flex-direction: column; gap: 3px; }
  .cc-hamburger span { width: 18px; height: 2px; background: #fff; border-radius: 1px; display: block; }

  .cc-demo-dot { position: absolute; top: 14px; right: 14px; background: rgba(67, 149, 162, 0.95); color: #fff; font-size: 10px; padding: 3px 8px; border-radius: 999px; z-index: 15; font-weight: 500; pointer-events: none; }

  .kira-card { margin: 14px 12px 4px; background: #ffffff; border-radius: 16px; padding: 14px; border: 1px solid rgba(100, 167, 11, 0.22); box-shadow: 0 1px 4px rgba(100, 167, 11, 0.08); }
  .kira-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .kira-icon { width: 36px; height: 36px; border-radius: 50%; background: #64a70b; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .kira-title { flex: 1; min-width: 0; }
  .kira-name { font-size: 14px; font-weight: 600; color: #2c2c2a; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .kira-badge { font-size: 10px; background: #eaf3de; color: #3B6D11; padding: 2px 7px; border-radius: 999px; font-weight: 500; }
  .kira-sub { font-size: 12px; color: #5f5e5a; margin-top: 1px; line-height: 1.35; }
  .kira-input-wrap { position: relative; }
  .kira-input { width: 100%; border: 1px solid rgba(100, 167, 11, 0.25); border-radius: 12px; padding: 11px 44px 11px 14px; font-size: 14.5px; font-family: inherit; background: #fff; color: #2c2c2a; resize: none; line-height: 1.4; box-sizing: border-box; }
  .kira-input:focus { outline: none; border-color: #64a70b; }
  .kira-send { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); background: #64a70b; color: #fff; border: 0; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .kira-send:hover { background: #4d8208; }
  .kira-send:disabled { background: #B4B2A9; cursor: not-allowed; }
  .kira-suggestions { display: flex; gap: 6px; margin-top: 10px; overflow-x: auto; padding-bottom: 4px; }
  .kira-suggestions::-webkit-scrollbar { display: none; }
  .kira-chip { background: #f7fbf0; border: 1px solid rgba(100, 167, 11, 0.3); border-radius: 999px; padding: 6px 12px; font-size: 12px; color: #3B6D11; cursor: pointer; white-space: nowrap; font-family: inherit; font-weight: 500; flex-shrink: 0; }
  .kira-chip:hover { background: #eaf3de; }
  .kira-thinking { display: flex; align-items: center; gap: 10px; padding: 10px 2px 2px; color: #5f5e5a; font-size: 13px; }
  .kira-dots { display: inline-flex; gap: 4px; }
  .kira-dots span { width: 7px; height: 7px; border-radius: 50%; background: #64a70b; animation: kira-pulse 1.2s infinite ease-in-out; }
  .kira-dots span:nth-child(2) { animation-delay: 0.15s; }
  .kira-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes kira-pulse { 0%, 60%, 100% { opacity: 0.3; transform: scale(0.85); } 30% { opacity: 1; transform: scale(1); } }
  .kira-result { margin-top: 12px; background: #f7fbf0; border-radius: 10px; padding: 12px 14px; border: 1px solid rgba(100, 167, 11, 0.22); animation: kira-slide 0.3s ease-out; }
  @keyframes kira-slide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .kira-result-head { font-size: 12.5px; color: #3B6D11; font-weight: 500; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
  .kira-result-item { display: flex; gap: 10px; padding: 9px 0; border-top: 0.5px solid rgba(100, 167, 11, 0.15); font-size: 13.5px; align-items: flex-start; }
  .kira-result-item:first-of-type { border-top: 0; padding-top: 0; }
  .kira-result-icon { width: 26px; height: 26px; border-radius: 7px; background: #eaf3de; color: #3B6D11; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .kira-result-text { flex: 1; color: #2c2c2a; line-height: 1.45; }
  .kira-result-text small { display: block; color: #5f5e5a; font-size: 11.5px; margin-top: 2px; }
  .kira-actions { display: flex; gap: 8px; margin-top: 12px; }
  .kira-btn-confirm { flex: 1; background: #64a70b; color: #fff; border: 0; border-radius: 8px; padding: 10px; font-size: 13.5px; font-weight: 500; font-family: inherit; cursor: pointer; }
  .kira-btn-confirm:hover { background: #4d8208; }
  .kira-btn-edit { background: #fff; color: #3B6D11; border: 1px solid rgba(100, 167, 11, 0.3); border-radius: 8px; padding: 10px 16px; font-size: 13.5px; font-weight: 500; font-family: inherit; cursor: pointer; }
  .kira-btn-edit:hover { background: #eaf3de; }
  .ai-badge-inline { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; background: #eaf3de; color: #3B6D11; padding: 1px 6px; border-radius: 4px; font-weight: 500; vertical-align: middle; margin-left: 6px; }

  /* Services styles */
  .service-rec-card {
    margin: 12px 12px 4px;
    background: #fff;
    border-radius: 14px;
    padding: 0;
    border: 1px solid rgba(12, 68, 124, 0.22);
    overflow: hidden;
  }
  .service-rec-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px 10px;
    background: #f0f6fc;
    border-bottom: 1px solid rgba(12, 68, 124, 0.15);
  }
  .service-rec-icon {
    width: 28px; height: 28px; border-radius: 50%;
    background: #185FA5; display: flex;
    align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .service-rec-text { flex: 1; min-width: 0; }
  .service-rec-title { font-size: 13px; font-weight: 600; color: #2c2c2a; }
  .service-rec-context { font-size: 11.5px; color: #5f5e5a; margin-top: 1px; line-height: 1.35; }
  .service-category-row {
    display: flex; gap: 8px;
    padding: 12px 14px;
    overflow-x: auto;
    background: #fff;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .service-category-row::-webkit-scrollbar { display: none; }
  .service-cat-chip {
    background: #F0F2F8;
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 999px;
    padding: 7px 12px;
    font-size: 12.5px;
    color: #2c2c2a;
    white-space: nowrap;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    flex-shrink: 0;
  }
  .service-cat-chip.active {
    background: #185FA5;
    color: #fff;
    border-color: #185FA5;
  }

  .pro-card {
    background: #fff;
    padding: 14px;
    border-bottom: 0.5px solid rgba(0,0,0,0.06);
    display: flex;
    gap: 12px;
  }
  .pro-card:last-child { border-bottom: 0; }
  .pro-avatar {
    width: 52px; height: 52px;
    border-radius: 12px;
    background: #e6f1fb;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: #185FA5;
    font-weight: 600;
    font-size: 18px;
  }
  .pro-info { flex: 1; min-width: 0; }
  .pro-name-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 2px;
  }
  .pro-name {
    font-size: 14.5px;
    font-weight: 600;
    color: #2c2c2a;
  }
  .pro-verified {
    background: #eaf3de;
    color: #3B6D11;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 2px;
  }
  .pro-stars { font-size: 12.5px; color: #BA7517; font-weight: 500; margin-bottom: 3px; }
  .pro-stars small { color: #888780; font-weight: 400; }
  .pro-tagline { font-size: 12px; color: #5f5e5a; margin-bottom: 6px; line-height: 1.4; }
  .pro-meta-row {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 11.5px;
    color: #5f5e5a;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .pro-quote {
    font-size: 13px;
    font-weight: 600;
    color: #2c2c2a;
  }
  .pro-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .pro-btn {
    background: #185FA5;
    color: #fff;
    border: 0;
    border-radius: 6px;
    padding: 6px 11px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .pro-btn:hover { background: #0C447C; }
  .pro-btn.secondary {
    background: #fff;
    color: #185FA5;
    border: 1px solid #185FA5;
  }
  .pro-btn.secondary:hover { background: #e6f1fb; }
  .service-disclosure {
    padding: 8px 14px;
    background: #faf8f0;
    font-size: 10.5px;
    color: #5f5e5a;
    line-height: 1.45;
    border-top: 0.5px solid rgba(186, 117, 23, 0.15);
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }
  .service-disclosure svg { color: #BA7517; flex-shrink: 0; margin-top: 1px; }

  /* Booking modal */
  .booking-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: flex-end;
    z-index: 30;
    animation: fade-in 0.2s ease;
  }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  .booking-sheet {
    background: #fff;
    width: 100%;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    max-height: 85%;
    overflow-y: auto;
    animation: slide-up 0.25s ease;
  }
  @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .booking-sheet h3 { font-size: 18px; font-weight: 600; margin: 0 0 6px; }
  .booking-sheet .booking-sub { font-size: 13px; color: #5f5e5a; margin: 0 0 16px; }
  .booking-summary {
    background: #F4F6F9;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
    font-size: 13.5px;
  }
  .booking-summary-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .booking-summary-row:last-child {
    margin-bottom: 0;
    padding-top: 6px;
    border-top: 0.5px solid rgba(0,0,0,0.08);
    font-weight: 600;
  }
  .booking-summary-label { color: #5f5e5a; }
  .booking-summary-value { color: #2c2c2a; }

              '<div style="font-size: 13.5px; font-weight: 600; color: #2c2c2a;">Grab bar installation</div>' +
              '<div style="font-size: 11.5px; color: #5f5e5a; margin-top: 1px;">' + pros.length + ' pros available near 80126</div>' +
            '</div>' +
          '</div>' +
          proCards +
        '</div>' +

        '<div class="service-disclosure" style="margin: 14px 12px 0; border-radius: 10px; border: 0.5px solid rgba(186, 117, 23, 0.2); border-top: 0.5px solid rgba(186, 117, 23, 0.2);">' +
          '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>' +
          '<span>CrewCares earns a referral fee when you book through the app. All pros are independent — we don\'t employ them. Full pricing is set at the time of booking with the pro directly.</span>' +
        '</div>' +
      '</div>' +
      tabBar() +
      (state.bookingModal ? bookingModal() : '');
  }

  function bookingModal(){
    const b = state.bookingModal;
    return '<div class="booking-overlay" data-action="close-booking-backdrop">' +
      '<div class="booking-sheet">' +
        '<h3>Book ' + b.name + '</h3>' +
        '<p class="booking-sub">' + b.business + '</p>' +

        '<div class="booking-summary">' +
          '<div class="booking-summary-row"><span class="booking-summary-label">Service</span><span class="booking-summary-value">Grab bar installation</span></div>' +
          '<div class="booking-summary-row"><span class="booking-summary-label">Location</span><span class="booking-summary-value">Dad\'s house</span></div>' +
          '<div class="booking-summary-row"><span class="booking-summary-label">Estimated time</span><span class="booking-summary-value">Thursday, 10 AM</span></div>' +
          '<div class="booking-summary-row"><span class="booking-summary-label">Estimated cost</span><span class="booking-summary-value">' + b.quote + '</span></div>' +
        '</div>' +

        '<div class="crew-notify-box">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>' +
          '<span><strong>The crew will be notified.</strong> When you book, a note goes to crew chat: "Brent booked Mike R. for grab bar install, Thursday 10 AM, $289." Anyone can object within 4 hours before it\'s confirmed.</span>' +
        '</div>' +

        '<div class="booking-actions">' +
          '<button class="booking-btn-secondary" data-action="close-booking">Cancel</button>' +
          '<button class="booking-btn-primary" data-action="confirm-booking">Confirm booking</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  function tasksScreen(){
    const grouped = {
      'To-Do': state.tasks.filter(function(t){ return t.status === 'todo'; }),
      'In Progress': state.tasks.filter(function(t){ return t.status === 'inprogress'; }),
      'Done': state.tasks.filter(function(t){ return t.status === 'done'; })
    };
    const sections = Object.entries(grouped).filter(function(e){ return e[1].length > 0; }).map(function(entry){
      const k = entry[0], tasks = entry[1];
      return '<div class="cc-section-head">' + k + ' · ' + tasks.length + '</div><div style="background: #fff; margin: 0 12px 8px; border-radius: 10px; overflow: hidden;">' +
        tasks.map(function(t, i){
          const done = state.completedTasks.has(t.id) || t.status === 'done';
          const member = state.members.find(function(m){ return m.name === t.assignee; });
          return '<div class="cc-task-row" style="' + (i<tasks.length-1?'border-bottom:0.5px solid rgba(0,0,0,0.06);':'') + '"><div class="cc-checkbox ' + (done?'checked':'') + '">' + (done ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : '') + '</div><div style="flex:1;"><p style="font-size:15px; margin:0 0 4px; ' + (done?'text-decoration:line-through; color:#888780;':'color:#2c2c2a;') + '">' + t.title + '</p><div style="display:flex; gap:8px; align-items:center;">' + (member ? '<div class="cc-avatar sm" style="background:' + member.color + '; width:20px; height:20px; font-size:9px;">' + member.initials + '</div><p style="font-size:12px; color:#888780; margin:0;">' + t.assignee + ' · ' + t.due + '</p>' : '') + '</div></div></div>';
        }).join('') + '</div>';
    }).join('');

    return statusBar() + header('Tasks', { menu: true }) +
      '<div class="cc-body" style="padding-bottom: 90px;">' +
        sections +
        '<div style="margin: 20px 12px;"><button class="cc-btn-secondary" style="border-color:#185FA5; color:#185FA5;" data-go="services">' +
          '<span style="display:inline-flex; align-items:center; gap:6px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>Need a pro? Find home services</span>' +
        '</button></div>' +
      '</div>' +
      tabBar();
  }

  function calendarScreen(){
    const days = [];
    for (let i = 0; i < 3; i++) days.push({ day: 29 + i, other: true });
    for (let d = 1; d <= 30; d++) days.push({ day: d });
    for (let i = 1; i <= 4; i++) days.push({ day: i, other: true });

    const eventDays = new Set(state.events.map(function(e){ return e.day; }));
    const today = 12;
    const grid = days.map(function(d){
      let cls = 'cc-calendar-day';
      if (d.other) cls += ' other-month';
      if (!d.other && d.day === today) cls += ' today';
      if (!d.other && eventDays.has(d.day)) cls += ' has-event';
      return '<div class="' + cls + '">' + d.day + '</div>';
    }).join('');

    return statusBar() + header('Calendar', { menu: true }) +
      '<div class="cc-body" style="padding-bottom: 90px;">' +
        '<div style="padding: 16px; display:flex; justify-content:space-between; align-items:center;"><h2 style="font-size:20px; font-weight:500; margin:0;">November 2026</h2></div>' +
        '<div style="margin: 0 12px; background: #fff; border-radius: 12px; padding: 10px;"><div style="display:grid; grid-template-columns: repeat(7, 1fr); text-align:center; margin-bottom:6px;">' +
          ['S','M','T','W','T','F','S'].map(function(d){ return '<div style="font-size:11px; color:#888780; padding:6px 0; font-weight:500;">' + d + '</div>'; }).join('') +
        '</div><div style="display:grid; grid-template-columns: repeat(7, 1fr); gap:2px;">' + grid + '</div></div>' +
        '<div class="cc-section-head">Upcoming events</div>' +
        state.events.map(function(e){
          return '<div class="cc-card" style="margin-bottom: 8px; display:flex; align-items:center; gap:14px;"><div style="width:42px; text-align:center;"><p style="font-size:11px; color:#e99797; margin:0; text-transform:uppercase; font-weight:500;">Nov</p><p style="font-size:22px; margin:0; font-weight:500; color:#2c2c2a;">' + e.day + '</p></div><div style="flex:1; border-left: 0.5px solid rgba(0,0,0,0.1); padding-left: 12px;"><p style="font-size:15px; margin:0 0 2px;">' + e.title + '</p><p style="font-size:12px; color:#888780; margin:0;">' + e.time + '</p></div></div>';
        }).join('') +
      '</div>' + tabBar();
  }

  function renderChatMessage(m){
    if (m.from === 'me') {
      return '<div class="cc-chat-row mine"><div class="cc-chat-bubble mine">' + m.text + '</div></div>';
    } else if (m.from === 'Kira') {
      return '<div><p class="cc-chat-sender ai">' + SPARKLES + ' Kira · AI care coordinator</p><div class="cc-chat-row theirs"><div class="cc-avatar sm" style="background:#64a70b;">' + SPARKLES + '</div><div class="cc-chat-bubble ai">' + m.text + '</div></div></div>';
    } else if (m.from === 'system-booking') {
      return '<div><p class="cc-chat-sender service"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg> Service booking</p><div class="cc-chat-row theirs"><div class="cc-avatar sm" style="background:#185FA5;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div><div class="cc-chat-bubble theirs" style="background:#f0f6fc; border: 1px solid rgba(12, 68, 124, 0.2); color:#185FA5;">' + m.text + '</div></div></div>';
    } else if (m.from === 'pro-completion') {
      return '<div><p class="cc-chat-sender service"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg> Mike R. · Job complete</p><div class="cc-chat-row theirs"><div class="cc-avatar sm" style="background:#185FA5;">MR</div>' +
        '<div class="completion-card">' +
          '<div class="completion-hdr">' + CHECK + ' Job completed — photo from the pro</div>' +
          '<div class="completion-photo">' +
            '<svg width="60" height="60" viewBox="0 0 48 48" fill="none" stroke="#5f5e5a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">' +
              '<rect x="6" y="12" width="36" height="28" rx="2"/>' +
              '<path d="M6 20h36"/>' +
              '<rect x="14" y="24" width="4" height="10" rx="1" fill="#888780"/>' +
              '<rect x="30" y="24" width="4" height="10" rx="1" fill="#888780"/>' +
              '<path d="M13 25 h22" stroke="#2c2c2a" stroke-width="3.5"/>' +
            '</svg>' +
            '<div class="completion-photo-label">Bathroom · 2:47 PM</div>' +
          '</div>' +
          '<div class="completion-body">' +
            '<div class="completion-title">Grab bar installed by toilet</div>' +
            '<div class="completion-note">Standard 12" ADA-compliant bar, mounted to studs. Everything tested and stable. Cleaned up before leaving.</div>' +
            '<div class="completion-meta">' +
              '<span>Today, 2:47 PM · 45 min job</span>' +
              '<span class="completion-cost">$289</span>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div></div>';
    } else {
      return '<div><p class="cc-chat-sender">' + m.from + '</p><div class="cc-chat-row theirs"><div class="cc-avatar sm" style="background:' + m.color + ';">' + m.from[0] + '</div><div class="cc-chat-bubble theirs">' + m.text + '</div></div></div>';
    }
  }

  function chatScreen(){
    const messages = state.chat.map(renderChatMessage).join('');
    return statusBar() + header('Crew Chat', { menu: true }) +
      '<div class="cc-body" style="padding: 12px 0 130px;">' + messages + '</div>' +
      '<div class="cc-chat-input-row"><input class="cc-chat-input" placeholder="Message" value="' + state.chatDraft + '" data-field="chatDraft"/><button class="cc-send-btn" data-action="send-message" aria-label="Send">↑</button></div>' +
      tabBar();
  }

  function membersScreen(){
    return statusBar() + header('Crew Members', { menu: true, rightLabel: 'Invite', rightAction: 'invite', rightPrimary: true }) +
      '<div class="cc-body" style="padding-bottom: 90px;">' +
        '<div style="padding: 20px 16px; text-align:center; background:#fff; margin-bottom: 12px;"><div class="cc-avatar lg" style="background:#4395a2; margin: 0 auto 12px;">TC</div><h2 style="font-size:18px; font-weight:500; margin: 0 0 4px;">' + state.crewName + '</h2><p style="font-size:13px; color:#888780; margin:0;">Crew code: <strong style="color:#2c2c2a;">7K4PM</strong></p></div>' +
        state.members.map(function(m){
          return '<div class="cc-menu-item"><div class="cc-avatar" style="background:' + m.color + ';">' + m.initials + '</div><div style="flex:1;"><p style="font-size:15px; margin:0; color:#2c2c2a;">' + m.name + '</p><p style="font-size:12px; color:#888780; margin:2px 0 0;">' + m.role + '</p></div>' + (m.role === 'Crew Leader' ? '<span class="cc-pill" style="background:#eaf4f5; color:#4395a2;">Leader</span>' : '<span class="cc-dot-ind" title="Online"></span>') + '</div>';
        }).join('') +
        '<div class="cc-menu-item" style="border-top: 8px solid #F0F2F8; background: #f7fbf0;"><div class="cc-avatar" style="background:#64a70b;">' + SPARKLES + '</div><div style="flex:1;"><p style="font-size:15px; margin:0; color:#2c2c2a;">Kira</p><p style="font-size:12px; color:#3B6D11; margin:2px 0 0;">AI care coordinator</p></div><span class="cc-pill" style="background:#eaf3de; color:#3B6D11;">Always on</span></div>' +
      '</div>' + tabBar();
  }

  function menuScreen(){
    return statusBar() + header('Menu', { back: 'home' }) +
      '<div class="cc-body" style="padding-bottom: 20px;">' +
        '<div style="padding: 20px 16px 12px; background:#fff;"><div style="display:flex; align-items:center; gap:12px;"><div class="cc-avatar lg" style="background:#4395a2;">B</div><div><p style="font-size:17px; font-weight:500; margin:0;">Brent</p><p style="font-size:13px; color:#888780; margin: 2px 0 0;">Crew Leader · ' + state.crewName + '</p></div></div></div>' +
        '<div style="margin: 12px 0 0;">' +
          '<div class="cc-menu-item" data-tab="members"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4395a2" stroke-width="2"><circle cx="9" cy="8" r="4"/><path d="M2 21c0-3.9 3.1-7 7-7s7 3.1 7 7"/></svg><span style="flex:1;">Crew members</span><span style="color:#888780;">›</span></div>' +
          '<div class="cc-menu-item" data-go="services"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2" stroke-linecap="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg><span style="flex:1;">Home services <span style="background:#e6f1fb; color:#185FA5; font-size:10px; padding:1px 6px; border-radius:4px; margin-left:6px; font-weight:500;">New</span></span><span style="color:#888780;">›</span></div>' +
          '<div class="cc-menu-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#64a70b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.64 5.64l2.12 2.12M16.24 16.24l2.12 2.12M5.64 18.36l2.12-2.12M16.24 7.76l2.12-2.12"/></svg><span style="flex:1;">Kira settings</span><span style="color:#888780;">›</span></div>' +
          '<div class="cc-menu-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4395a2" stroke-width="2"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span style="flex:1;">Invite new member</span><span style="color:#888780;">›</span></div>' +
          '<div class="cc-menu-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4395a2" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6M12 17v6M4.22 4.22l4.24 4.24M15.54 15.54l4.24 4.24M1 12h6M17 12h6"/></svg><span style="flex:1;">Settings</span><span style="color:#888780;">›</span></div>' +
        '</div>' +
        '<div style="margin: 24px 16px;"><button class="cc-btn-secondary" style="color:#e99797; border-color:#e99797;" data-go="welcome">Leave crew</button></div>' +
      '</div>';
  }

  const RENDERERS = {
    welcome: welcome,
    home: homeScreen,
    tasks: tasksScreen,
    calendar: calendarScreen,
    chat: chatScreen,
    members: membersScreen,
    menu: menuScreen,
    services: servicesScreen
  };

  function render(){
    screen.innerHTML = RENDERERS[state.screen]();
    const sc = SCREENS.find(function(s){ return s.id === state.screen; });
    label.textContent = sc ? sc.label : state.screen;
    jumpBar.innerHTML = SCREENS.map(function(s){
      return '<button class="cc-jump-btn ' + (s.id===state.screen?'active':'') + '" data-jump="' + s.id + '">' + s.label + '</button>';
    }).join('');
    screen.scrollTop = 0;
    const body = screen.querySelector('.cc-body');
    if (body) body.scrollTop = state.screen === 'chat' ? 9999 : 0;
  }

  function confirmBooking(){
    const b = state.bookingModal;
    if (!b) return;

    state.chat.push({ from: 'system-booking', text: 'Brent booked ' + b.name + ' (' + b.business + ') for grab bar installation, Thursday 10 AM. Estimated cost: ' + b.quote + '. Crew can object within 4 hours.' });

    setTimeout(function(){
      state.chat.push({ from: 'Sarah', text: 'Thank you for handling this — was worried we wouldn\'t get to it before the weekend.', color: '#e99797' });
      render();
    }, 300);

    setTimeout(function(){
      state.chat.push({ from: 'pro-completion', text: '' });
      render();
    }, 1200);

    setTimeout(function(){
      state.chat.push({ from: 'Kira', text: 'The install is done. I marked "Grab bar install" as complete in tasks and logged the $289 to the shared care expense tracker.' });
      render();
    }, 2000);

    state.bookingModal = null;
    state.screen = 'chat';
    state.tab = 'chat';
    render();
  }

  document.addEventListener('click', function(e){
    const tgt = e.target.closest('[data-go],[data-tab],[data-action],[data-task],[data-jump],[data-cat],[data-pro]');
    if (!tgt) return;

    if (tgt.dataset.jump) {
      state.screen = tgt.dataset.jump;
      if (['home','tasks','calendar','chat','members'].indexOf(tgt.dataset.jump) !== -1) state.tab = tgt.dataset.jump;
      render();
      return;
    }
    if (tgt.dataset.go) {
      go(tgt.dataset.go);
      return;
    }
    if (tgt.dataset.tab) { setTab(tgt.dataset.tab); return; }
    if (tgt.dataset.cat) {
      if (!tgt.disabled) { state.serviceCat = tgt.dataset.cat; render(); }
      return;
    }

    const action = tgt.dataset.action;
    if (action === 'dismiss-rec') { state.recDismissed = true; render(); }
    else if (action === 'book-pro') {
      state.bookingModal = {
        pro: tgt.dataset.pro,
        name: tgt.dataset.name,
        business: tgt.dataset.business,
        quote: tgt.dataset.quote
      };
      render();
    }
    else if (action === 'close-booking') {
      state.bookingModal = null;
      render();
    }
    else if (action === 'close-booking-backdrop') {
      // Only close if clicking the overlay itself, not its contents
      if (e.target === tgt) {
        state.bookingModal = null;
        render();
      }
    }
    else if (action === 'confirm-booking') {
      confirmBooking();
    }
    else if (action === 'view-pro') {
      alert('Demo: would open full pro profile — reviews, portfolio photos, credentials, direct messaging.');
    }
    else if (action === 'send-message') {
      const input = screen.querySelector('[data-field="chatDraft"]');
      const text = (input && input.value || '').trim();
      if (text) { state.chat.push({ from: 'me', text: text }); state.chatDraft = ''; render(); }
    }
  });

  document.addEventListener('input', function(e){
    const f = e.target.dataset && e.target.dataset.field;
    if (f) state[f] = e.target.value;
  });

  render();
})();
</script>
</body>
</html>
