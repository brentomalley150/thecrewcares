  .nova-card {

<script>

    chat: [

  const SPARKLES = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.64 5.64l2.12 2.12M16.24 16.24l2.12 2.12M5.64 18.36l2.12-2.12M16.24 7.76l2.12-2.12"/></svg>';

  function go(s){ state.screen = s; render(); }

  function parseIntent(text){
    const t = text.toLowerCase();
    const members = ['Sarah', 'Michael', 'Linda', 'Brent'];
    let assignee = null;
    for (let i = 0; i < members.length; i++) {
      if (t.indexOf(members[i].toLowerCase()) !== -1) { assignee = members[i]; break; }
    }

    const hasTimePattern = /\b(at |by )?(\d{1,2})(:\d{2})?\s?(am|pm)\b/i.test(text);
    const isSchedule = t.indexOf('schedule') !== -1 || t.indexOf('appointment') !== -1 || t.indexOf('meeting') !== -1 || (hasTimePattern && t.indexOf('remind') === -1);

    if (isSchedule) {
      const when = extractWhen(text) || 'Tomorrow · 2:00 PM';
      const title = extractTitle(text) || 'New appointment';
      return {
        summary: "Here's what I'll set up. Review and confirm.",
        items: [
          { type: 'event', title: title, detail: when },
          { type: 'chat', title: 'Post a note to crew chat', detail: 'So everyone sees the update' }
        ]
      };
    }

    if (t.indexOf('summary') !== -1 || t.indexOf('catch me up') !== -1 || t.indexOf('this week') !== -1 || t.indexOf('what\'s happen') !== -1 || t.indexOf('status') !== -1) {
      return {
        summary: "Here's where the crew is this week:",
        items: [
          { type: 'insight', title: '2 tasks completed, 4 in progress', detail: 'Sarah handled pharmacy pickup · Michael on PT coordination' },
          { type: 'insight', title: 'Medication change is in motion', detail: 'Half dose this week per Dr. Martinez, full dose next week' },
          { type: 'insight', title: '3 events upcoming', detail: 'Cardiology Nov 8 · Home Health Nov 14 · PT Nov 22' }
        ]
      };
    }

    if (t.indexOf('remind') !== -1 || t.indexOf('pick up') !== -1 || t.indexOf('need ') !== -1 || t.indexOf('buy') !== -1 || t.indexOf('get ') !== -1 || t.indexOf('call') !== -1 || t.indexOf('ask ') !== -1) {
      const title = extractTitle(text) || 'New task';
      const when = extractWhen(text) || 'This week';
      return {
        summary: "Got it. Here's what I'll set up:",
        items: [
          { type: 'task', title: title, detail: (assignee ? 'Assigned to ' + assignee : 'Unassigned') + ' · ' + when },
          { type: 'chat', title: 'Let ' + (assignee || 'the crew') + ' know', detail: 'Small note in the crew chat' }
        ]
      };
    }

    const title = extractTitle(text) || text.slice(0, 40);
    return {
      summary: "I can help with that. Here's what I'd set up:",
      items: [
        { type: 'task', title: title, detail: (assignee ? 'Assigned to ' + assignee : 'Unassigned') + ' · This week' }
      ]
    };
  }

  function extractTitle(text){
    let t = text.trim();
    t = t.replace(/^(can you |please |could you |hey |)/i, '');
    t = t.replace(/^(remind|tell|ask) (sarah|michael|linda|brent|the crew|dad|mom) (to |about |that |)/i, '');
    t = t.replace(/^(add|create|schedule|set up) (a |an |)/i, '');
    t = t.replace(/\bfor (sarah|michael|linda|brent|dad|mom)\b/i, '');
    t = t.replace(/\btomorrow\b/gi, '').replace(/\btoday\b/gi, '').replace(/\bnext week\b/gi, '');
    t = t.replace(/\bat \d{1,2}(:\d{2})?\s?(am|pm)\b/i, '').replace(/\s+/g, ' ').trim();
    if (t.length > 0) t = t.charAt(0).toUpperCase() + t.slice(1);
    if (t.length > 58) t = t.slice(0, 55) + '...';
    return t;
  }
  function extractWhen(text){
    const t = text.toLowerCase();
    const parts = [];
    if (t.indexOf('tomorrow') !== -1) parts.push('Tomorrow');
    else if (t.indexOf('today') !== -1) parts.push('Today');
    else if (t.indexOf('next week') !== -1) parts.push('Next week');
    else if (t.indexOf('this week') !== -1) parts.push('This week');
    else if (t.indexOf('monday') !== -1) parts.push('Monday');
    else if (t.indexOf('tuesday') !== -1) parts.push('Tuesday');
    else if (t.indexOf('wednesday') !== -1) parts.push('Wednesday');
    else if (t.indexOf('thursday') !== -1) parts.push('Thursday');
    else if (t.indexOf('friday') !== -1) parts.push('Friday');
    else if (t.indexOf('weekend') !== -1) parts.push('This weekend');
    const timeMatch = text.match(/\b(\d{1,2})(:\d{2})?\s?(am|pm)\b/i);
    if (timeMatch) parts.push(timeMatch[0].trim());
    return parts.length ? parts.join(' · ') : null;
  }

        '<div style="margin: 0 12px; background: #fff; border-radius: 12px; padding: 10px;"><div style="display:grid; grid-template-columns: repeat(7, 1fr); text-align:center; margin-bottom:6px;">' +
          ['S','M','T','W','T','F','S'].map(function(d){ return '<div style="font-size:11px; color:#888780; padding:6px 0; font-weight:500;">' + d + '</div>'; }).join('') +
        '</div><div style="display:grid; grid-template-columns: repeat(7, 1fr); gap:2px;">' + grid + '</div></div>' +
        '<div class="cc-section-head">Upcoming events</div>' +
        state.events.map(function(e){
          return '<div class="cc-card" style="margin-bottom: 8px; display:flex; align-items:center; gap:14px;"><div style="width:42px; text-align:center;"><p style="font-size:11px; color:#e99797; margin:0; text-transform:uppercase; font-weight:500;">Nov</p><p style="font-size:22px; margin:0; font-weight:500; color:#2c2c2a;">' + e.day + '</p></div><div style="flex:1; border-left: 0.5px solid rgba(0,0,0,0.1); padding-left: 12px;"><p style="font-size:15px; margin:0 0 2px;">' + e.title + (e.aiCreated ? '<span class="ai-badge-inline">' + SPARKLES + ' Nova</span>' : '') + '</p><p style="font-size:12px; color:#888780; margin:0;">' + e.time + '</p></div></div>';
        }).join('') +
      '</div>' + tabBar();
  }

  function chatScreen(){
    const messages = state.chat.map(function(m){
      if (m.from === 'me') {
        return '<div class="cc-chat-row mine"><div class="cc-chat-bubble mine">' + m.text + '</div></div>';
      } else if (m.from === 'Nova') {
        return '<div><p class="cc-chat-sender ai">' + SPARKLES + ' Nova · AI care coordinator</p><div class="cc-chat-row theirs"><div class="cc-avatar sm" style="background:#64a70b;">' + SPARKLES + '</div><div class="cc-chat-bubble ai">' + m.text + '</div></div></div>';
      } else {
        return '<div><p class="cc-chat-sender">' + m.from + '</p><div class="cc-chat-row theirs"><div class="cc-avatar sm" style="background:' + m.color + ';">' + m.from[0] + '</div><div class="cc-chat-bubble theirs">' + m.text + '</div></div></div>';
      }
    }).join('');
    return statusBar() + header('Crew Chat', { menu: true }) +
      '<div class="cc-body" style="padding: 12px 0 130px;">' + messages + '</div>' +
      '<div class="cc-chat-input-row"><input class="cc-chat-input" placeholder="Message" value="' + state.chatDraft + '" data-field="chatDraft"/><button class="cc-send-btn" data-action="send-message" aria-label="Send">↑</button></div>' +
      tabBar();
  }

  function membersScreen(){
    return statusBar() + header('Crew Members', { menu: true, rightLabel: 'Invite', rightAction: 'invite', rightPrimary: true }) +
      '<div class="cc-body" style="padding-bottom: 90px;">' +
        '<div style="padding: 20px 16px; text-align:center; background:#fff; margin-bottom: 12px;"><div class="cc-avatar lg" style="background:#4395a2; margin: 0 auto 12px;">TC</div><h2 style="font-size:18px; font-weight:500; margin: 0 0 4px;">' + state.crewName + '</h2><p style="font-size:13px; color:#888780; margin:0;">Crew code: <strong style="color:#2c2c2a;">7K4PM</strong> · ' + state.members.length + ' members + Nova</p></div>' +
        state.members.map(function(m){
          return '<div class="cc-menu-item"><div class="cc-avatar" style="background:' + m.color + ';">' + m.initials + '</div><div style="flex:1;"><p style="font-size:15px; margin:0; color:#2c2c2a;">' + m.name + '</p><p style="font-size:12px; color:#888780; margin:2px 0 0;">' + m.role + '</p></div>' + (m.role === 'Crew Leader' ? '<span class="cc-pill" style="background:#eaf4f5; color:#4395a2;">Leader</span>' : '<span class="cc-dot-ind" title="Online"></span>') + '</div>';
        }).join('') +
        '<div class="cc-menu-item" style="border-top: 8px solid #F0F2F8; background: #f7fbf0;"><div class="cc-avatar" style="background:#64a70b;">' + SPARKLES + '</div><div style="flex:1;"><p style="font-size:15px; margin:0; color:#2c2c2a;">Nova</p><p style="font-size:12px; color:#3B6D11; margin:2px 0 0;">AI care coordinator</p></div><span class="cc-pill" style="background:#eaf3de; color:#3B6D11;">Always on</span></div>' +
      '</div>' + tabBar();
  }

  function menuScreen(){
    return statusBar() + header('Menu', { back: 'home' }) +
      '<div class="cc-body" style="padding-bottom: 20px;">' +
        '<div style="padding: 20px 16px 12px; background:#fff;"><div style="display:flex; align-items:center; gap:12px;"><div class="cc-avatar lg" style="background:#4395a2;">B</div><div><p style="font-size:17px; font-weight:500; margin:0;">Brent</p><p style="font-size:13px; color:#888780; margin: 2px 0 0;">Crew Leader · ' + state.crewName + '</p></div></div></div>' +
        '<div style="margin: 12px 0 0;">' +
          '<div class="cc-menu-item" data-tab="members"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4395a2" stroke-width="2"><circle cx="9" cy="8" r="4"/><path d="M2 21c0-3.9 3.1-7 7-7s7 3.1 7 7"/></svg><span style="flex:1;">Crew members</span><span style="color:#888780;">›</span></div>' +
          '<div class="cc-menu-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#64a70b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.64 5.64l2.12 2.12M16.24 16.24l2.12 2.12M5.64 18.36l2.12-2.12M16.24 7.76l2.12-2.12"/></svg><span style="flex:1;">Nova settings</span><span style="color:#888780;">›</span></div>' +
          '<div class="cc-menu-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4395a2" stroke-width="2"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span style="flex:1;">Invite new member</span><span style="color:#888780;">›</span></div>' +
          '<div class="cc-menu-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4395a2" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6M12 17v6M4.22 4.22l4.24 4.24M15.54 15.54l4.24 4.24M1 12h6M17 12h6"/></svg><span style="flex:1;">Settings</span><span style="color:#888780;">›</span></div>' +
          '<div class="cc-menu-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4395a2" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-6 0v4"/><rect x="3" y="11" width="18" height="11" rx="2"/></svg><span style="flex:1;">Send feedback</span><span style="color:#888780;">›</span></div>' +
        '</div>' +
        '<div style="margin: 24px 16px;"><button class="cc-btn-secondary" style="color:#e99797; border-color:#e99797;" data-go="welcome">Leave crew</button></div>' +
      '</div>';
  }

  const RENDERERS = {
    welcome: welcome, create: createScreen, 'code-sent': codeSentScreen,
    join: joinScreen, home: homeScreen, tasks: tasksScreen,
    calendar: calendarScreen, chat: chatScreen, members: membersScreen, menu: menuScreen
  };

  function render(){
    screen.innerHTML = RENDERERS[state.screen]();
    const sc = SCREENS.find(function(s){ return s.id === state.screen; });
    label.textContent = sc ? sc.label : state.screen;
    jumpBar.innerHTML = SCREENS.map(function(s){
      return '<button class="cc-jump-btn ' + (s.id===state.screen?'active':'') + '" data-jump="' + s.id + '">' + s.label + '</button>';
    }).join('');
    screen.scrollTop = 0;
    const body = screen.querySelector('.cc-body');
    if (body) body.scrollTop = state.screen === 'chat' ? 9999 : 0;
  }

  function novaSend(){
    const text = state.novaInput.trim();
    if (!text) return;
    state.novaPhase = 'thinking';
    render();
    setTimeout(function(){
      state.novaProposal = parseIntent(text);
      state.novaPhase = 'proposal';
      render();
    }, 1100);
  }

  function novaConfirm(){
    const p = state.novaProposal;
    if (!p) return;
    const originalInput = state.novaInput;
    let chatSummary = '';

    p.items.forEach(function(item){
      if (item.type === 'task') {
        const assigneeMatch = item.detail.match(/Assigned to (\w+)/);
        const newTask = {
          id: 't' + (state.tasks.length + 100),
          title: item.title,
          status: assigneeMatch ? 'todo' : 'unassigned',
          assignee: assigneeMatch ? assigneeMatch[1] : null,
          due: item.detail.split('·').pop().trim() || 'This week',
          aiCreated: true
        };
        state.tasks.unshift(newTask);
        chatSummary = 'Added "' + item.title + '"' + (assigneeMatch ? ' for ' + assigneeMatch[1] : '') + '.';
      } else if (item.type === 'event') {
        state.events.push({
          day: 15,
          title: item.title,
          time: item.detail,
          aiCreated: true
        });
        chatSummary = 'Put "' + item.title + '" on the calendar — ' + item.detail + '.';
      }
    });

    if (chatSummary) {
      state.chat.push({ from: 'Nova', text: chatSummary + ' (Based on Brent\'s note: "' + originalInput + '")' });
    }

    state.novaInput = '';
    state.novaProposal = null;
    state.novaPhase = 'idle';
    render();
  }

  function novaDismiss(){
    state.novaInput = '';
    state.novaProposal = null;
    state.novaPhase = 'idle';
    render();
  }

  document.addEventListener('click', function(e){
    const tgt = e.target.closest('[data-go],[data-tab],[data-action],[data-task],[data-jump],[data-suggestion]');
    if (!tgt) return;
    if (tgt.dataset.suggestion) {
      state.novaInput = tgt.dataset.suggestion;
      novaSend();
      return;
    }
    if (tgt.dataset.jump) {
      state.screen = tgt.dataset.jump;
      if (['home','tasks','calendar','chat','members'].indexOf(tgt.dataset.jump) !== -1) state.tab = tgt.dataset.jump;
      render();
      return;
    }
    if (tgt.dataset.go) { go(tgt.dataset.go); return; }
    if (tgt.dataset.tab) { setTab(tgt.dataset.tab); return; }
    if (tgt.dataset.task) {
      const id = tgt.dataset.task;
      if (state.completedTasks.has(id)) state.completedTasks.delete(id); else state.completedTasks.add(id);
      render();
      return;
    }
    const action = tgt.dataset.action;
    if (action === 'create-submit') go('code-sent');
    else if (action === 'join-submit') go('home');
    else if (action === 'nova-send') novaSend();
    else if (action === 'nova-confirm') novaConfirm();
    else if (action === 'nova-dismiss') novaDismiss();
    else if (action === 'send-message') {
      const input = screen.querySelector('[data-field="chatDraft"]');
      const text = (input && input.value || '').trim();
      if (text) { state.chat.push({ from: 'me', text: text }); state.chatDraft = ''; render(); }
    } else if (action === 'invite') {
      alert('Demo: invite new crew member');
    }
  });

  document.addEventListener('input', function(e){
    const f = e.target.dataset && e.target.dataset.field;
    if (f) {
      state[f] = e.target.value;
      if (f === 'novaInput') {
        const btn = screen.querySelector('[data-action="nova-send"]');
        if (btn) {
          if (state.novaInput.trim()) btn.removeAttribute('disabled');
          else btn.setAttribute('disabled', '');
        }
      }
    }
  });

  document.addEventListener('keydown', function(e){
    if (e.key === 'Enter' && !e.shiftKey && e.target.id === 'nova-input') {
      e.preventDefault();
      novaSend();
    }
  });

  render();
})();
</script>
</body>
</html>
